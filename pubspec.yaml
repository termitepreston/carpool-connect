name: carpool_connect
description: A new Flutter project.
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

workspace:
  - packages/core
  - packages/models
  - packages/ui_kit
  - apps/mobile_app

dev_dependencies:
  melos: ^7.7.0

melos:
  scripts:
    analyze:
      run: |
        melos exec -c 1 -- "dart analyze . --fatal-infos"
      description: Run dart analyzer in a specific package.
    run_mobile:
      run: |
        melos exec -c 1 --scope="mobile_app" -- "flutter run -d linux"
      description: Run the mobile app.
    test_all:
      run: |
        melos exec -c 1 -- "flutter test"
      description: Run all tests in the workspace.
    build_apk:
      run: |
        melos exec -c 1 --scope="mobile_app" -- "flutter build apk"
      description: Build the Android APK.
    build_runner:
      run: |
        melos exec -c 1 --depends-on="build_runner" -- "dart run build_runner build --delete-conflicting-outputs"
      description: Run build_runner for all packages.
    bootstrap:
      run: melos bootstrap
      description: Bootstrap the workspace.
